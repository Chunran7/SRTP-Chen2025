spring:
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yltxdb
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  port: 8080

mybatis:
  configuration:
    map-underscore-to-camel-case: true

# 管理员简单 token 配置，用于后端管理接口的简单校验
admin:
  token: secret-admin-token

# 文件上传路径配置
file:
  upload-path: C:/Users/Chunran/Desktop/SRTPchen2025/uploads/
  # 各类图片的子目录
  sub-paths:
    article: articles/          # 文章首图
    content: content/           # 文章内容图片（编辑器上传）
    introduction: introductions/ # 介绍页面图片
    avatar: avatars/            # 用户头像